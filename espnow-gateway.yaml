substitutions:
  device_name: espnow-gateway

esphome:
  name: ${device_name}
  friendly_name: ESPNow Gateway

esp32:
  board: esp32-c6-devkitc-1
  variant: esp32c6
  flash_size: 4MB
  framework:
    # platform_version: 6.6.0
    type: esp-idf
    # version: 5.2.1
    sdkconfig_options:
      CONFIG_ESPTOOLPY_FLASHSIZE_4MB: y

external_components:
  - source:
      type: local
      path: components
packages:
  ota_wifi: !include common/jpg_ota_ha.yaml

espnow_gateway:
  id: gateway
  num_nodes:
    name: "Number of Nodes"
    discovery: false
  nodes_list:
    name: "Associated Node Names"
    discovery: false
  nodes_json:
    name: "Associated Nodes (JSON)"
    discovery: false
  on_node_joined:
    - lambda: |-
        ESP_LOGD("main", "Node joined: %s", node_name.c_str());
    - light.turn_on: 
        id: board_rgb_led
        brightness: 100%
        transition_length: 100ms
    - delay: 1s
    - light.turn_off: board_rgb_led

# Enable logging
logger:
  level: INFO

# Enable Home Assistant API
api:
  encryption:
    key: "yLvELUBJvVhkbD3kl3uCMDzE0CsKFGi8kXFHm4tv3JQ="

ota:
  - platform: esphome
    password: "419d622b25005e2b488cbf6b6f0ae967"
    

safe_mode:
  boot_is_good_after: 
    seconds: 15
  

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    ssid: "${device_name} Fallback Hotspot"
    password: !secret web_server_password
  on_connect: 
    then:
      - lambda: "gateway->initESPNow();"
mqtt:
  broker: !secret mqtt_broker_lan
  username: !secret mqtt_user
  password: !secret mqtt_password
  discovery_unique_id_generator: mac
  discovery_object_id_generator: device_name
  id: mqtt_client
  on_connect: 
    then:
      - lambda: "gateway->set_mqtt(id(mqtt_client));"

light:
  - platform: esp32_rmt_led_strip
    name: RGB LED
    id: board_rgb_led
    pin:
      number: 8
      ignore_strapping_warning: True
    num_leds: 1
    chipset: WS2812
    rgb_order: GRB
    effects: 
      - pulse: 
          max_brightness: 100%
          min_brightness: 25%
          name: identifyPulse